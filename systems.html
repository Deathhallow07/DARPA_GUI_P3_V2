<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS - System Selection</title>
    <style>
        :root { --bg: #070b14; --panel: #0f172a; --accent: #0ea5e9; --text: #f8fafc; --border: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { 
            background: var(--panel); border: 1px solid var(--border); 
            padding: 20px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card h3 { margin: 0; color: var(--accent); }
        .card p { color: #94a3b8; font-family: monospace; font-size: 0.9rem; }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    </style>
</head>
<body>
    <h2>SELECT <span style="color:var(--accent)">SYSTEM</span></h2>
    <div class="grid">
        <div class="card" onclick="select('UAV 1')"><h3>UAV 1</h3><p>STATUS: ONLINE</p></div>
        <div class="card" onclick="select('UAV 2')"><h3>UAV 2</h3><p>STATUS: ONLINE</p></div>
        <div class="card" onclick="select('UAV 3')"><h3>UAV 3</h3><p>STATUS: STANDBY</p></div>
        <div class="card" onclick="select('UAV 4')"><h3>UAV 4</h3><p>STATUS: ONLINE</p></div>
        <div class="card" onclick="select('UAV 5')"><h3>UAV 5</h3><p>STATUS: ONLINE</p></div>
        <div class="card" onclick="select('UAV 6')"><h3>UAV 6</h3><p>STATUS: ONLINE</p></div>
        <div class="card" onclick="select('UGV 1')"><h3>UGV 1</h3><p>STATUS: ONLINE</p></div>
        <div class="card" onclick="select('UGV 2')"><h3>UGV 2</h3><p>STATUS: ONLINE</p></div>
    </div>
    <script>
        function select(name) {
            localStorage.setItem('gcs_selected_system', name);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
